# .github/workflows/build-noop-ipa.yml
#
# Builds an UNSIGNED device .ipa of the NOOP iOS port (PR #42) on a macOS
# runner and uploads it as an artifact. Download the artifact to Windows and
# install it with SideStore, which re-signs on-device with your free Apple ID.
#
# Run it from your own fork:
#   1. Fork NoopApp/noop, then add this file at .github/workflows/build-noop-ipa.yml
#   2. Actions tab -> "Build NOOP unsigned ipa" -> Run workflow
#   3. Download the "NOOP-unsigned-ipa" artifact when it finishes
#
# Notes / things you may need to tweak:
#   - SCHEME: the PR defines "NOOPiOS" (app) and "NOOPiOSWidgets" (extension).
#     Building NOOPiOS embeds the widget. For a clean free-Apple-ID sideload,
#     consider removing the widget target from project.yml first (see comment
#     below) so App Groups / the extra App ID don't break signing on-device.
#   - XCODE: the PR was verified against a very recent iOS SDK. You're building
#     against a deployment target of iOS 16/17, so an older SDK is fine. If the
#     build fails on SDK/Swift version, bump the Xcode select line.

name: Build NOOP unsigned ipa

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15   # try macos-latest if 15 lacks the needed Xcode
    steps:
      - name: Check out PR #42
        uses: actions/checkout@v4
        with:
          # Pull the iOS port branch directly from the contributor's fork.
          repository: eltomato89/noop
          ref: iOS

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # OPTIONAL: strip the widget extension before building so a free Apple ID
      # sideload doesn't choke on App Groups / a second App ID. Uncomment if you
      # hit signing failures on the extension in SideStore.
      # - name: Drop widget target
      #   run: |
      #     # edit project.yml to remove the NOOPiOSWidgets target + its embed,
      #     # then re-run: xcodegen generate

      - name: Build unsigned device app
        run: |
          set -o pipefail
          xcodebuild \
            -scheme NOOPiOS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build | tee build.log

      - name: Package .ipa
        run: |
          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -n1)"
          echo "Packaging: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          # Unsigned ipa: SideStore signs it on-device with your Apple ID.
          zip -r NOOP-unsigned.ipa Payload >/dev/null
          ls -lh NOOP-unsigned.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NOOP-unsigned-ipa
          path: NOOP-unsigned.ipa
          if-no-found: error
          retention-days: 7
