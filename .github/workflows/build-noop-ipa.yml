# .github/workflows/build-noop-ipa.yml
#
# Builds an UNSIGNED device .ipa of the NOOP iOS port (PR #42) on a macOS 26
# runner (Xcode 26 / iOS 26 SDK) and uploads it as an artifact. Download it to
# Windows and install with SideStore, which re-signs on-device with your free
# Apple ID.
#
# v2 changes:
#   - runs-on: macos-26  (Xcode 26 + iOS 26.5 SDK; the PR was built against this)
#   - checkout@v5        (Node 24; removes the deprecation warning)
#   - diagnostics: prints Xcode version, lists schemes, pretty-prints the build
#   - fixed upload-artifact input (if-no-files-found, not if-no-found)

name: Build NOOP unsigned ipa

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Check out PR #42
        uses: actions/checkout@v5
        with:
          repository: eltomato89/noop
          ref: iOS

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List schemes (diagnostic)
        run: xcodebuild -list || xcodebuild -list -project *.xcodeproj || true

      # OPTIONAL: if SideStore later refuses the .ipa over the widget's App Group
      # or the extra App ID, strip the NOOPiOSWidgets target from project.yml and
      # re-run xcodegen generate before building (main app only).

      - name: Build unsigned device app
        run: |
          set -o pipefail
          xcodebuild \
            -scheme NOOPiOS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build 2>&1 | tee build.log | xcbeautify || {
              echo "::group::Last 60 lines of raw build log"
              tail -n 60 build.log
              echo "::endgroup::"
              exit 65
            }

      - name: Package .ipa
        run: |
          APP_PATH="$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' | head -n1)"
          echo "Packaging: $APP_PATH"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r NOOP-unsigned.ipa Payload >/dev/null
          ls -lh NOOP-unsigned.ipa

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NOOP-unsigned-ipa
          path: NOOP-unsigned.ipa
          if-no-files-found: error
          retention-days: 7
